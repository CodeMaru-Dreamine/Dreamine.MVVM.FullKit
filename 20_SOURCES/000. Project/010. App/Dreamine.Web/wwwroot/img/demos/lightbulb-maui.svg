<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" font-family="'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <radialGradient id="glowMaui" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe08a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffe08a" stop-opacity="0"/>
    </radialGradient>
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 폰 베젤 -->
  <g filter="url(#phoneShadow)">
    <rect x="30" y="16" width="240" height="388" rx="34" fill="#0f0f14" stroke="#2a2a33" stroke-width="2"/>
  </g>
  <!-- 스크린 -->
  <rect x="42" y="28" width="216" height="364" rx="24" fill="#ffffff"/>
  <!-- 노치 -->
  <rect x="120" y="30" width="60" height="16" rx="8" fill="#0f0f14"/>

  <!-- 앱바 (.NET MAUI 퍼플) -->
  <path d="M42 52a0 0 0 0 1 0 0h216v40H42z" fill="#512BD4"/>
  <rect x="42" y="52" width="216" height="40" fill="#512BD4"/>
  <text x="60" y="77" font-size="15" fill="#fff" font-weight="600">LightBulb</text>

  <!-- 본문: 전구 ON -->
  <circle cx="150" cy="170" r="66" fill="url(#glowMaui)"/>
  <circle cx="150" cy="162" r="34" fill="#ffd54a" stroke="#eab000" stroke-width="2"/>
  <path d="M139 168c3.5-8 7-8 11 0s7.5 8 11 0" fill="none" stroke="#8a5a00" stroke-width="2.2" stroke-linecap="round"/>
  <rect x="140" y="196" width="20" height="4.5" rx="2" fill="#c2c2c2"/>
  <rect x="142" y="202.5" width="16" height="4.5" rx="2" fill="#c2c2c2"/>
  <rect x="143.5" y="209" width="13" height="4.5" rx="2" fill="#c2c2c2"/>
  <text x="150" y="238" font-size="13" font-weight="700" fill="#c98a00" text-anchor="middle" letter-spacing="2">ON</text>

  <!-- Switch (MAUI 토글) -->
  <text x="72" y="285" font-size="14" fill="#222">전원</text>
  <rect x="170" y="273" width="52" height="28" rx="14" fill="#512BD4"/>
  <circle cx="208" cy="287" r="11" fill="#fff"/>

  <!-- 버튼 -->
  <rect x="72" y="318" width="156" height="42" rx="8" fill="#512BD4"/>
  <text x="150" y="345" font-size="15" fill="#fff" text-anchor="middle" font-weight="600">토글</text>

  <!-- 카운트 -->
  <text x="150" y="382" font-size="12" fill="#666" text-anchor="middle">토글 3회</text>
</svg>
