<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="Tahoma, 'MS Sans Serif', Arial, sans-serif">
  <defs>
    <radialGradient id="glowWf" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe08a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffe08a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wfTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6ea5"/>
      <stop offset="100%" stop-color="#2b5486"/>
    </linearGradient>
    <linearGradient id="wfBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#e1e1e1"/>
    </linearGradient>
    <filter id="wfShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 창 (클래식 폼) -->
  <g filter="url(#wfShadow)">
    <rect x="24" y="20" width="472" height="340" rx="3" fill="#f0f0f0" stroke="#7a7a7a"/>
  </g>
  <!-- 타이틀바 -->
  <rect x="25" y="21" width="470" height="30" rx="2" fill="url(#wfTitle)"/>
  <text x="38" y="41" font-size="13" fill="#fff" font-weight="700">LightBulb</text>
  <g>
    <rect x="404" y="27" width="26" height="18" rx="2" fill="#dfe7f0" stroke="#2b5486"/>
    <rect x="434" y="27" width="26" height="18" rx="2" fill="#dfe7f0" stroke="#2b5486"/>
    <rect x="464" y="27" width="26" height="18" rx="2" fill="#c9524a" stroke="#7a2b26"/>
    <text x="412" y="41" font-size="12" fill="#123">_</text>
    <rect x="441" y="31" width="12" height="10" fill="none" stroke="#123" stroke-width="1.3"/>
    <path d="M470 31 L484 43 M484 31 L470 43" stroke="#fff" stroke-width="1.6"/>
  </g>

  <!-- 본문: 전구 ON -->
  <circle cx="260" cy="150" r="72" fill="url(#glowWf)"/>
  <circle cx="260" cy="142" r="38" fill="#ffd54a" stroke="#eab000" stroke-width="2"/>
  <path d="M247 148c4-9 8-9 13 0s9 9 13 0" fill="none" stroke="#8a5a00" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="249" y="180" width="22" height="5" rx="1" fill="#a9a9a9"/>
  <rect x="251" y="187" width="18" height="5" rx="1" fill="#a9a9a9"/>
  <rect x="253" y="194" width="14" height="5" rx="1" fill="#a9a9a9"/>
  <text x="260" y="224" font-size="13" font-weight="700" fill="#b07f00" text-anchor="middle" letter-spacing="1">ON</text>

  <!-- 컨트롤 (클래식 3D) -->
  <g transform="translate(150,250)">
    <!-- 토글 버튼 -->
    <rect x="0" y="0" width="92" height="34" rx="2" fill="url(#wfBtn)" stroke="#707070"/>
    <rect x="1" y="1" width="90" height="1.5" fill="#ffffff"/>
    <text x="46" y="22" font-size="13" fill="#111" text-anchor="middle">토글</text>
    <!-- 체크박스 -->
    <rect x="112" y="7" width="18" height="18" rx="1" fill="#fff" stroke="#707070"/>
    <path d="M115 16 L120 21 L127 10" fill="none" stroke="#123" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="137" y="22" font-size="13" fill="#111">전원</text>
    <!-- 카운트 -->
    <text x="195" y="22" font-size="12" fill="#444">토글 3회</text>
  </g>
</svg>
