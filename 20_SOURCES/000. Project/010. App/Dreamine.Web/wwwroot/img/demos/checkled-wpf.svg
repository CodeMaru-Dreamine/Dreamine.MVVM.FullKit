<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/></filter>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#69f0ae"/>
      <stop offset="50%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#009624"/>
    </radialGradient>
    <filter id="ledglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#s)"><rect x="24" y="20" width="472" height="220" rx="10" fill="#fff" stroke="#e2e2e2"/></g>
  <path d="M24 30a10 10 0 0 1 10-10h452a10 10 0 0 1 10 10v22H24z" fill="#f3f3f3"/>
  <text x="62" y="45" font-size="13" fill="#1b1b1b" font-weight="600">CheckLed Demo — WPF</text>
  <text x="430" y="46" font-size="15" fill="#5a5a5a" letter-spacing="6">⎯ ▢ ✕</text>
  <line x1="24" y1="52" x2="496" y2="52" stroke="#ececec"/>

  <!-- LED (ON, green glow) -->
  <circle cx="140" cy="105" r="18" fill="url(#glow)" filter="url(#ledglow)"/>
  <circle cx="133" cy="98" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- ON/OFF Button -->
  <rect x="200" y="88" width="80" height="32" rx="5" fill="#0067c0"/>
  <text x="240" y="109" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">ON / OFF</text>

  <!-- Pulse Button -->
  <rect x="300" y="88" width="80" height="32" rx="5" fill="#e1e1e1" stroke="#ccc"/>
  <text x="340" y="109" font-size="13" fill="#333" text-anchor="middle" font-weight="600">Pulse</text>

  <text x="60" y="180" font-size="13" fill="#666">IsOn = <tspan font-weight="700">True</tspan> · IsPulse = <tspan font-weight="700">False</tspan></text>
</svg>
