  <text x="150" y="54" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#fff" font-weight="600">Expander Demo</text>
  <!-- Expander header -->
  <rect x="54" y="84" width="192" height="36" rx="8" fill="#f3f0ff" stroke="#512BD4" stroke-width="1"/>
