<svg viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
  <rect x="30" y="10" width="240" height="340" rx="34" fill="#1a1a1a"/>
  <rect x="42" y="28" width="216" height="304" rx="4" fill="#fff"/>
  <rect x="110" y="10" width="80" height="18" rx="9" fill="#1a1a1a"/>
