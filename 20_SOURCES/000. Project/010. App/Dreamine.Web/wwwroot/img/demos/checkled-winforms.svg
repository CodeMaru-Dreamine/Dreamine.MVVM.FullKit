<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/></filter>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#69f0ae"/>
      <stop offset="50%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#009624"/>
    </radialGradient>
    <filter id="ledglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#s)"><rect x="24" y="20" width="472" height="220" rx="4" fill="#f0f0f0" stroke="#999"/></g>
  <rect x="24" y="20" width="472" height="30" rx="4" fill="#fff" stroke="#bbb" stroke-width="0.5"/>
  <text x="40" y="41" font-size="12" fill="#333" font-weight="600">CheckLed Demo</text>
  <text x="450" y="41" font-size="13" fill="#666" letter-spacing="4">— □ ✕</text>

  <!-- LED (ON, green glow) -->
  <circle cx="140" cy="100" r="18" fill="url(#glow)" filter="url(#ledglow)"/>
  <circle cx="133" cy="93" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- ON/OFF Button -->
  <rect x="200" y="84" width="80" height="30" rx="3" fill="#e1e1e1" stroke="#aaa"/>
  <text x="240" y="104" font-size="12" fill="#333" text-anchor="middle" font-weight="600">ON / OFF</text>

  <!-- Pulse Button -->
  <rect x="300" y="84" width="80" height="30" rx="3" fill="#e1e1e1" stroke="#aaa"/>
  <text x="340" y="104" font-size="12" fill="#333" text-anchor="middle" font-weight="600">Pulse</text>

  <text x="60" y="170" font-size="12" fill="#555">IsOn = <tspan font-weight="700">True</tspan> · IsPulse = <tspan font-weight="700">False</tspan></text>
</svg>
