<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="Segoe UI, Arial, sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/></filter></defs>
  <g filter="url(#s)"><rect x="24" y="20" width="472" height="260" rx="10" fill="#fff" stroke="#e2e2e2"/></g>
  <path d="M24 30a10 10 0 0 1 10-10h452a10 10 0 0 1 10 10v22H24z" fill="#f3f3f3"/>
  <text x="62" y="45" font-size="13" fill="#1b1b1b" font-weight="600">TextBox Demo — WPF</text>
  <text x="430" y="46" font-size="15" fill="#5a5a5a" letter-spacing="6">⎯ ▢ ✕</text>
  <line x1="24" y1="52" x2="496" y2="52" stroke="#ececec"/>

  <!-- Text input -->
  <rect x="60" y="75" width="320" height="32" rx="4" fill="#fff" stroke="#0067c0" stroke-width="1.5"/>
  <text x="72" y="96" font-size="14" fill="#1b1b1b">Hello World</text>
  <!-- Clear button -->
  <rect x="392" y="79" width="24" height="24" rx="12" fill="#e8e8e8"/>
  <text x="404" y="96" font-size="14" fill="#888" text-anchor="middle">✕</text>

  <!-- Password input -->
  <rect x="60" y="125" width="320" height="32" rx="4" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
  <text x="72" y="147" font-size="16" fill="#1b1b1b" letter-spacing="3">●●●●●●</text>
  <!-- Clear button -->
  <rect x="392" y="129" width="24" height="24" rx="12" fill="#e8e8e8"/>
  <text x="404" y="146" font-size="14" fill="#888" text-anchor="middle">✕</text>

  <text x="60" y="195" font-size="13" fill="#666">값: <tspan font-weight="700">Hello World</tspan></text>
  <text x="60" y="215" font-size="13" fill="#666">길이: <tspan font-weight="700">6</tspan> 자</text>
</svg>
