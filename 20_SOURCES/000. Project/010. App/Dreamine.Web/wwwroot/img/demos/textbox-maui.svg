<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs><filter id="ps" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/></filter></defs>
  <g filter="url(#ps)"><rect x="30" y="16" width="240" height="368" rx="34" fill="#0f0f14" stroke="#2a2a33" stroke-width="2"/></g>
  <rect x="42" y="28" width="216" height="344" rx="24" fill="#fff"/>
  <rect x="120" y="30" width="60" height="16" rx="8" fill="#0f0f14"/>
  <rect x="42" y="52" width="216" height="40" fill="#512BD4"/>
  <text x="60" y="77" font-size="15" fill="#fff" font-weight="600">TextBox</text>

  <!-- Text input -->
  <rect x="62" y="112" width="156" height="32" rx="4" fill="#fff" stroke="#512BD4" stroke-width="1.5"/>
  <text x="72" y="133" font-size="13" fill="#222">Hello World</text>
  <!-- Clear button -->
  <rect x="224" y="116" width="24" height="24" rx="12" fill="#e8e8e8"/>
  <text x="236" y="133" font-size="13" fill="#888" text-anchor="middle">✕</text>

  <!-- Password input -->
  <rect x="62" y="160" width="156" height="32" rx="4" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
  <text x="72" y="182" font-size="15" fill="#222" letter-spacing="3">●●●●●●</text>
  <!-- Clear button -->
  <rect x="224" y="164" width="24" height="24" rx="12" fill="#e8e8e8"/>
  <text x="236" y="181" font-size="13" fill="#888" text-anchor="middle">✕</text>

  <text x="150" y="230" font-size="13" fill="#666" text-anchor="middle">값: Hello World</text>
  <text x="150" y="252" font-size="13" fill="#666" text-anchor="middle">길이: 6 자</text>
</svg>
