<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <filter id="ps" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/></filter>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#69f0ae"/>
      <stop offset="50%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#009624"/>
    </radialGradient>
    <filter id="ledglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#ps)"><rect x="30" y="16" width="240" height="328" rx="34" fill="#0f0f14" stroke="#2a2a33" stroke-width="2"/></g>
  <rect x="42" y="28" width="216" height="304" rx="24" fill="#fff"/>
  <rect x="120" y="30" width="60" height="16" rx="8" fill="#0f0f14"/>
  <rect x="42" y="52" width="216" height="40" fill="#512BD4"/>
  <text x="60" y="77" font-size="15" fill="#fff" font-weight="600">CheckLed</text>

  <!-- LED (ON, green glow) -->
  <circle cx="150" cy="130" r="18" fill="url(#glow)" filter="url(#ledglow)"/>
  <circle cx="143" cy="123" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- ON/OFF Button -->
  <rect x="72" y="170" width="76" height="34" rx="6" fill="#512BD4"/>
  <text x="110" y="192" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">ON / OFF</text>

  <!-- Pulse Button -->
  <rect x="160" y="170" width="76" height="34" rx="6" fill="#e8e8e8" stroke="#ccc"/>
  <text x="198" y="192" font-size="13" fill="#333" text-anchor="middle" font-weight="600">Pulse</text>

  <text x="150" y="250" font-size="13" fill="#666" text-anchor="middle">IsOn = True · IsPulse = False</text>
</svg>
