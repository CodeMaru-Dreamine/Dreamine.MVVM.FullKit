<svg viewBox="0 0 520 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>
  <!-- Window -->
  <rect x="20" y="20" width="480" height="300" rx="10" fill="#fff" stroke="#d0d0d0" filter="url(#shadow)"/>
  <!-- Title bar -->
  <path d="M20 30a10 10 0 0 1 10-10h440a10 10 0 0 1 10 10v22H20z" fill="#f3f3f3"/>
  <text x="36" y="40" font-size="12" fill="#333">Counter Demo</text>
  <text x="452" y="41" font-size="11" fill="#888">⎯</text>
  <text x="470" y="41" font-size="11" fill="#888">▢</text>
  <text x="488" y="41" font-size="11" fill="#888">✕</text>
  <line x1="20" y1="52" x2="500" y2="52" stroke="#e0e0e0"/>
  <!-- Count display -->
  <text x="260" y="110" font-size="48" font-weight="bold" fill="#222" text-anchor="middle">Count: 7</text>
  <!-- Buttons -->
  <rect x="140" y="130" width="120" height="34" rx="4" fill="#0067c0"/>
  <text x="200" y="152" font-size="14" fill="#fff" text-anchor="middle">Increment</text>
  <rect x="275" y="130" width="100" height="34" rx="4" fill="#e0e0e0"/>
  <text x="325" y="152" font-size="14" fill="#333" text-anchor="middle">Reset</text>
  <!-- Log list -->
  <rect x="40" y="180" width="440" height="120" rx="4" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="50" y="200" font-size="11" fill="#666">[14:32:10] Incremented → 7</text>
  <text x="50" y="218" font-size="11" fill="#666">[14:32:09] Incremented → 6</text>
  <text x="50" y="236" font-size="11" fill="#666">[14:32:05] Counter reset.</text>
</svg>