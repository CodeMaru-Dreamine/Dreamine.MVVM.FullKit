<svg viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Window -->
  <rect x="20" y="16" width="480" height="230" rx="2" fill="#f0f0f0" stroke="#adadad" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="22" y="18" width="476" height="28" fill="#fff" stroke="#bbb" stroke-width="0.5"/>
  <text x="36" y="37" font-family="Segoe UI,sans-serif" font-size="12" fill="#333">ComboBox Demo</text>
  <g transform="translate(448,24)">
    <rect x="0" y="0" width="14" height="14" rx="1" fill="#e1e1e1" stroke="#adadad" stroke-width="0.5"/><line x1="3" y1="7" x2="11" y2="7" stroke="#333" stroke-width="1"/>
    <rect x="16" y="0" width="14" height="14" rx="1" fill="#e1e1e1" stroke="#adadad" stroke-width="0.5"/><rect x="19" y="3" width="8" height="8" rx="0" fill="none" stroke="#333" stroke-width="1"/>
    <rect x="32" y="0" width="14" height="14" rx="1" fill="#e1e1e1" stroke="#adadad" stroke-width="0.5"/><line x1="36" y1="3" x2="42" y2="11" stroke="#333" stroke-width="1"/><line x1="42" y1="3" x2="36" y2="11" stroke="#333" stroke-width="1"/>
  </g>
  <!-- ComboBox -->
  <rect x="60" y="64" width="200" height="24" rx="1" fill="#fff" stroke="#adadad" stroke-width="1"/>
  <rect x="236" y="64" width="24" height="24" rx="1" fill="#e1e1e1" stroke="#adadad" stroke-width="1"/>
  <text x="244" y="81" font-family="Segoe UI,sans-serif" font-size="10" fill="#333">&#x25BC;</text>
  <text x="68" y="81" font-family="Segoe UI,sans-serif" font-size="12" fill="#111">Cherry</text>
  <!-- Dropdown -->
  <rect x="60" y="88" width="200" height="78" fill="#fff" stroke="#adadad" stroke-width="1"/>
  <text x="68" y="106" font-family="Segoe UI,sans-serif" font-size="12" fill="#333">Apple</text>
  <text x="68" y="126" font-family="Segoe UI,sans-serif" font-size="12" fill="#333">Banana</text>
  <rect x="61" y="133" width="198" height="20" fill="#0078d7"/>
  <text x="68" y="148" font-family="Segoe UI,sans-serif" font-size="12" fill="#fff">Cherry</text>
  <!-- Status -->
  <text x="60" y="200" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">선택된 항목: Cherry</text>
