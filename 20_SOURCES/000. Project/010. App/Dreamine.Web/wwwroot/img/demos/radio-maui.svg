  <defs><filter id="ps" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/></filter></defs>
  <g filter="url(#ps)"><rect x="30" y="16" width="240" height="328" rx="34" fill="#0f0f14" stroke="#2a2a33" stroke-width="2"/></g>
