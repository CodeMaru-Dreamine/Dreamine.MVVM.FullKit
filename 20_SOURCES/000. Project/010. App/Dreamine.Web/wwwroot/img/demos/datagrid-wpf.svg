<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>
  <!-- Window -->
  <rect x="20" y="10" width="480" height="280" rx="10" fill="#fff" stroke="#d0d0d0" filter="url(#shadow)"/>
  <!-- Title bar -->
  <path d="M20 20a10 10 0 0 1 10-10h440a10 10 0 0 1 10 10v22H20z" fill="#f3f3f3"/>
  <text x="36" y="30" font-size="12" fill="#333">DataGrid Demo</text>
  <text x="452" y="31" font-size="11" fill="#888">⎯</text>
  <text x="470" y="31" font-size="11" fill="#888">▢</text>
  <text x="488" y="31" font-size="11" fill="#888">✕</text>
  <line x1="20" y1="42" x2="500" y2="42" stroke="#e0e0e0"/>
  <!-- Grid header -->
  <rect x="40" y="56" width="440" height="28" fill="#e8e8e8"/>
  <text x="70" y="74" font-size="12" font-weight="bold" fill="#333">No</text>
  <text x="170" y="74" font-size="12" font-weight="bold" fill="#333">Name</text>
  <text x="360" y="74" font-size="12" font-weight="bold" fill="#333">Status</text>
  <line x1="40" y1="84" x2="480" y2="84" stroke="#d0d0d0"/>
  <!-- Row 1 -->
  <text x="70" y="102" font-size="12" fill="#333">1</text>
  <text x="170" y="102" font-size="12" fill="#333">Device A</text>
  <circle cx="354" cy="98" r="5" fill="#2ecc40"/>
  <text x="366" y="102" font-size="12" fill="#333">Running</text>
  <line x1="40" y1="112" x2="480" y2="112" stroke="#eee"/>
  <!-- Row 2 (selected) -->
  <rect x="40" y="112" width="440" height="28" fill="#cce5ff"/>
  <text x="70" y="130" font-size="12" fill="#333">2</text>
  <text x="170" y="130" font-size="12" fill="#333">Device B</text>
  <text x="360" y="130" font-size="12" fill="#888">Stopped</text>
  <line x1="40" y1="140" x2="480" y2="140" stroke="#eee"/>
  <!-- Row 3 -->
  <text x="70" y="158" font-size="12" fill="#333">3</text>
  <text x="170" y="158" font-size="12" fill="#333">Device C</text>
  <circle cx="354" cy="154" r="5" fill="#2ecc40"/>
  <text x="366" y="158" font-size="12" fill="#333">Running</text>
  <line x1="40" y1="168" x2="480" y2="168" stroke="#eee"/>
  <!-- Row 4 -->
  <text x="70" y="186" font-size="12" fill="#333">4</text>
  <text x="170" y="186" font-size="12" fill="#333">Device D</text>
  <circle cx="354" cy="182" r="5" fill="#e74c3c"/>
  <text x="366" y="186" font-size="12" fill="#c0392b">Error</text>
  <!-- Grid border -->
  <rect x="40" y="56" width="440" height="140" rx="2" fill="none" stroke="#d0d0d0"/>
  <!-- Column lines -->
  <line x1="120" y1="56" x2="120" y2="196" stroke="#e0e0e0"/>
  <line x1="320" y1="56" x2="320" y2="196" stroke="#e0e0e0"/>
  <!-- Selection text -->
  <text x="40" y="224" font-size="13" fill="#0067c0">선택: Device B</text>
</svg>