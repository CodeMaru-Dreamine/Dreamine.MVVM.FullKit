<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="Segoe UI, Arial, sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/></filter></defs>
  <g filter="url(#s)"><rect x="24" y="20" width="472" height="220" rx="10" fill="#fff" stroke="#e2e2e2"/></g>
  <path d="M24 30a10 10 0 0 1 10-10h452a10 10 0 0 1 10 10v22H24z" fill="#f3f3f3"/>
  <text x="62" y="45" font-size="13" fill="#1b1b1b" font-weight="600">CheckBox Demo — WPF</text>
  <text x="430" y="46" font-size="15" fill="#5a5a5a" letter-spacing="6">⎯ ▢ ✕</text>
  <line x1="24" y1="52" x2="496" y2="52" stroke="#ececec"/>

  <!-- Check 1 (checked) -->
  <rect x="60" y="75" width="20" height="20" rx="4" fill="#0067c0"/>
  <path d="M64 85 L69 90 L76 79" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="90" y="90" font-size="14" fill="#1b1b1b">Check 1 (기본 체크됨)</text>

  <!-- Check 2 (unchecked) -->
  <rect x="60" y="110" width="20" height="20" rx="4" fill="none" stroke="#999" stroke-width="1.5"/>
  <text x="90" y="125" font-size="14" fill="#1b1b1b">Check 2</text>

  <!-- Check 3 (disabled) -->
  <rect x="60" y="145" width="20" height="20" rx="4" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5"/>
  <text x="90" y="160" font-size="14" fill="#999">Check 3 (비활성)</text>

  <text x="60" y="200" font-size="13" fill="#666">Check1 = <tspan font-weight="700">True</tspan> · Check2 = <tspan font-weight="700">False</tspan></text>
</svg>
