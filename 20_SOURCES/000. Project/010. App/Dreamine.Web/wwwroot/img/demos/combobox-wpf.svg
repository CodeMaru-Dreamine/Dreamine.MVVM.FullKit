<svg viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Window -->
  <rect x="20" y="16" width="480" height="230" rx="10" fill="#fff" filter="url(#shadow)"/>
  <!-- Title bar -->
  <path d="M20 26a10 10 0 0 1 10-10h460a10 10 0 0 1 10 10v22H20z" fill="#f3f3f3"/>
  <text x="36" y="38" font-family="Segoe UI,sans-serif" font-size="12" fill="#333">ComboBox Demo</text>
  <g transform="translate(460,26)">
    <rect x="0" y="0" width="16" height="14" rx="1" fill="none"/><line x1="3" y1="7" x2="13" y2="7" stroke="#888" stroke-width="1.2"/>
    <rect x="20" y="0" width="16" height="14" rx="1" fill="none"/><rect x="23" y="3" width="10" height="8" rx="1" fill="none" stroke="#888" stroke-width="1.2"/>
    <rect x="40" y="0" width="16" height="14" rx="1" fill="none"/><line x1="44" y1="3" x2="52" y2="11" stroke="#888" stroke-width="1.2"/><line x1="52" y1="3" x2="44" y2="11" stroke="#888" stroke-width="1.2"/>
  </g>
  <!-- ComboBox (open) -->
  <rect x="60" y="64" width="200" height="30" rx="4" fill="#fff" stroke="#0067c0" stroke-width="1.5"/>
  <text x="72" y="84" font-family="Segoe UI,sans-serif" font-size="13" fill="#111">Cherry</text>
  <text x="240" y="84" font-family="Segoe UI,sans-serif" font-size="12" fill="#666">&#x25BC;</text>
  <!-- Dropdown list -->
  <rect x="60" y="94" width="200" height="90" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="72" y="114" font-family="Segoe UI,sans-serif" font-size="13" fill="#333">Apple</text>
  <text x="72" y="138" font-family="Segoe UI,sans-serif" font-size="13" fill="#333">Banana</text>
  <rect x="62" y="148" width="196" height="24" rx="2" fill="#0067c0" opacity="0.9"/>
  <text x="72" y="164" font-family="Segoe UI,sans-serif" font-size="13" fill="#fff">Cherry</text>
  <!-- Status -->
  <text x="60" y="210" font-family="Segoe UI,sans-serif" font-size="12" fill="#555">선택된 항목: Cherry</text>
