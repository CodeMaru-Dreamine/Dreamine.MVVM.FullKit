<svg viewBox="0 0 520 240" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>
  <!-- Window -->
  <rect x="20" y="10" width="480" height="220" rx="10" fill="#fff" stroke="#d0d0d0" filter="url(#shadow)"/>
  <!-- Title bar -->
  <path d="M20 20a10 10 0 0 1 10-10h440a10 10 0 0 1 10 10v22H20z" fill="#f3f3f3"/>
  <text x="36" y="30" font-size="12" fill="#333">TimeSpinner Demo</text>
  <text x="452" y="31" font-size="11" fill="#888">⎯</text>
  <text x="470" y="31" font-size="11" fill="#888">▢</text>
  <text x="488" y="31" font-size="11" fill="#888">✕</text>
  <line x1="20" y1="42" x2="500" y2="42" stroke="#e0e0e0"/>
  <!-- Spinner widget dark bg -->
  <rect x="140" y="60" width="240" height="100" rx="8" fill="#162040"/>
  <!-- Up arrows -->
  <text x="190" y="82" font-size="16" fill="#8899cc" text-anchor="middle">▲</text>
  <text x="260" y="82" font-size="16" fill="#8899cc" text-anchor="middle">▲</text>
  <text x="330" y="82" font-size="16" fill="#8899cc" text-anchor="middle">▲</text>
  <!-- Time digits -->
  <text x="190" y="122" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">09</text>
  <text x="225" y="120" font-size="28" font-weight="bold" fill="#6688bb" text-anchor="middle">:</text>
  <text x="260" y="122" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">30</text>
  <text x="295" y="120" font-size="28" font-weight="bold" fill="#6688bb" text-anchor="middle">:</text>
  <text x="330" y="122" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">00</text>
  <!-- Down arrows -->
  <text x="190" y="150" font-size="16" fill="#8899cc" text-anchor="middle">▼</text>
  <text x="260" y="150" font-size="16" fill="#8899cc" text-anchor="middle">▼</text>
  <text x="330" y="150" font-size="16" fill="#8899cc" text-anchor="middle">▼</text>
  <!-- Selection text -->
  <text x="40" y="196" font-size="13" fill="#0067c0">선택 시각: 09:30:00</text>
</svg>