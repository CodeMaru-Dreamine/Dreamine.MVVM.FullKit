<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <!-- Window -->
  <rect x="20" y="10" width="480" height="280" rx="4" fill="#f0f0f0" stroke="#999"/>
  <!-- Title bar -->
  <rect x="20" y="10" width="480" height="30" rx="4" fill="#fff" stroke="#999"/>
  <rect x="20" y="36" width="480" height="4" fill="#f0f0f0"/>
  <text x="36" y="30" font-size="12" fill="#333">DataGridView Demo</text>
  <text x="458" y="30" font-size="11" fill="#888">⎯</text>
  <text x="474" y="30" font-size="11" fill="#888">▢</text>
  <text x="490" y="30" font-size="11" fill="#888">✕</text>
  <line x1="20" y1="40" x2="500" y2="40" stroke="#bbb"/>
  <!-- Grid header -->
  <rect x="40" y="54" width="440" height="26" fill="#e8e8e8" stroke="#bbb"/>
  <text x="70" y="72" font-size="12" font-weight="bold" fill="#333">No</text>
  <text x="170" y="72" font-size="12" font-weight="bold" fill="#333">Name</text>
  <text x="360" y="72" font-size="12" font-weight="bold" fill="#333">Status</text>
  <!-- Row 1 -->
  <rect x="40" y="80" width="440" height="26" fill="#fff" stroke="#bbb"/>
  <text x="70" y="98" font-size="12" fill="#333">1</text>
  <text x="170" y="98" font-size="12" fill="#333">Device A</text>
  <circle cx="354" cy="93" r="5" fill="#2ecc40"/>
  <text x="366" y="98" font-size="12" fill="#333">Running</text>
  <!-- Row 2 (selected) -->
  <rect x="40" y="106" width="440" height="26" fill="#cce5ff" stroke="#bbb"/>
  <text x="70" y="124" font-size="12" fill="#333">2</text>
  <text x="170" y="124" font-size="12" fill="#333">Device B</text>
  <text x="360" y="124" font-size="12" fill="#888">Stopped</text>
  <!-- Row 3 -->
  <rect x="40" y="132" width="440" height="26" fill="#fff" stroke="#bbb"/>
  <text x="70" y="150" font-size="12" fill="#333">3</text>
  <text x="170" y="150" font-size="12" fill="#333">Device C</text>
  <circle cx="354" cy="145" r="5" fill="#2ecc40"/>
  <text x="366" y="150" font-size="12" fill="#333">Running</text>
  <!-- Row 4 -->
  <rect x="40" y="158" width="440" height="26" fill="#fff" stroke="#bbb"/>
  <text x="70" y="176" font-size="12" fill="#333">4</text>
  <text x="170" y="176" font-size="12" fill="#333">Device D</text>
  <circle cx="354" cy="171" r="5" fill="#e74c3c"/>
  <text x="366" y="176" font-size="12" fill="#c0392b">Error</text>
  <!-- Column lines -->
  <line x1="120" y1="54" x2="120" y2="184" stroke="#bbb"/>
  <line x1="320" y1="54" x2="320" y2="184" stroke="#bbb"/>
  <!-- Selection text -->
  <text x="40" y="210" font-size="13" fill="#333">선택: Device B</text>
</svg>