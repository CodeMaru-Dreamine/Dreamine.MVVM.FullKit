<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="Segoe UI, Arial, sans-serif">
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/></filter></defs>
  <g filter="url(#s)"><rect x="24" y="20" width="472" height="220" rx="4" fill="#f0f0f0" stroke="#999"/></g>
  <rect x="24" y="20" width="472" height="30" rx="4" fill="#fff" stroke="#bbb" stroke-width="0.5"/>
  <text x="40" y="41" font-size="12" fill="#333" font-weight="600">RadioButton Demo</text>
  <text x="450" y="41" font-size="13" fill="#666" letter-spacing="4">— □ ✕</text>

  <!-- Option A (selected) -->
  <circle cx="68" cy="83" r="8" fill="none" stroke="#005a9e" stroke-width="1.5"/>
  <circle cx="68" cy="83" r="4" fill="#0067c0"/>
  <text x="84" y="88" font-size="13" fill="#333">Option A</text>

  <!-- Option B -->
  <circle cx="68" cy="113" r="8" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="84" y="118" font-size="13" fill="#333">Option B</text>

  <!-- Option C -->
  <circle cx="68" cy="143" r="8" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="84" y="148" font-size="13" fill="#333">Option C</text>

  <text x="60" y="190" font-size="12" fill="#555">선택: <tspan font-weight="700">Option A</tspan></text>
</svg>
