<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6ee"/>
      <stop offset="50%" style="stop-color:#f5e8d8"/>
      <stop offset="100%" style="stop-color:#eedcc8"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.92)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.75)"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 장식 원 -->
  <circle cx="80" cy="80" r="160" fill="rgba(200,168,130,0.08)"/>
  <circle cx="1120" cy="550" r="200" fill="rgba(200,168,130,0.08)"/>
  <circle cx="1050" cy="100" r="80" fill="rgba(200,168,130,0.06)"/>
  <circle cx="150" cy="520" r="100" fill="rgba(200,168,130,0.06)"/>

  <!-- 카드 -->
  <rect x="200" y="100" width="800" height="430" rx="24" fill="url(#card)" stroke="rgba(200,168,130,0.3)" stroke-width="1.5"/>

  <!-- 하트 아이콘 -->
  <text x="600" y="210" font-size="56" text-anchor="middle">💒</text>

  <!-- 메인 타이틀 -->
  <text x="600" y="290" font-family="Georgia, serif" font-size="48" font-weight="700"
        fill="#3a2e28" text-anchor="middle" letter-spacing="2">무료 모바일 청첩장</text>

  <!-- 서브타이틀 -->
  <text x="600" y="345" font-family="Arial, sans-serif" font-size="22"
        fill="#7a6a5e" text-anchor="middle">사진 · 음악 · 지도 · 방명록 · 계좌 안내</text>

  <!-- 구분선 -->
  <line x1="420" y1="375" x2="780" y2="375" stroke="rgba(200,168,130,0.5)" stroke-width="1.5"/>

  <!-- 배지 -->
  <rect x="470" y="395" width="260" height="42" rx="21" fill="#c8a882"/>
  <text x="600" y="422" font-family="Arial, sans-serif" font-size="18" font-weight="600"
        fill="white" text-anchor="middle">5분이면 완성 · 완전 무료</text>

  <!-- 도메인 -->
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="20"
        fill="rgba(58,46,40,0.45)" text-anchor="middle">wedding.codemaru.co.kr</text>
</svg>
