# ============================================================
# Codemaru Wedding Platform — nginx 리버스 프록시 설정
#
# [사용법]
# 1. nginx for Windows 설치: https://nginx.org/en/download.html
#    또는 Chocolatey: choco install nginx
#
# 2. SSL 인증서 발급 (무료 Let's Encrypt):
#    win-acme: https://www.win-acme.com/
#    certbot:  certbot certonly --standalone -d wedding.codemaru.co.kr
#
# 3. 이 파일을 nginx/conf/nginx.conf 로 복사
#    (또는 nginx/conf/conf.d/wedding.conf 로 include)
#
# 4. nginx 시작: nginx.exe 실행 또는 서비스로 등록
#
# [앱 포트]
# appsettings.Production.json: "Port": 4080, "ListenAnyIp": false
# 앱은 localhost:4080 에서만 대기, 외부 노출은 nginx 담당
# ============================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # 업로드 파일 크기 제한 (동영상 업로드 고려, 2GB)
    client_max_body_size 2048m;

    # ── HTTP → HTTPS 리다이렉트 ─────────────────────────────────
    server {
        listen 80;
        server_name wedding.codemaru.co.kr;

        # Let's Encrypt ACME 챌린지 허용 (인증서 갱신용)
        location /.well-known/acme-challenge/ {
            root C:/certbot/webroot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS + WebSocket 프록시 ─────────────────────────────────
    server {
        listen 443 ssl;
        server_name wedding.codemaru.co.kr;

        # SSL 인증서 경로 (win-acme 또는 certbot 발급 후 경로 수정)
        ssl_certificate     C:/wedding/ssl/fullchain.pem;
        ssl_certificate_key C:/wedding/ssl/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Blazor Server SignalR WebSocket 지원 ─────────────────
        # 삼성 인터넷 등 모든 브라우저에서 wss:// 로 안정적으로 동작하려면
        # 아래 Upgrade / Connection 헤더 전달이 반드시 필요합니다.
        location / {
            proxy_pass          http://localhost:4080;
            proxy_http_version  1.1;

            # WebSocket 업그레이드 헤더 전달 (핵심!)
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";

            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;

            # Blazor SignalR 장기 연결 타임아웃 설정
            proxy_read_timeout  600s;
            proxy_send_timeout  600s;
            proxy_connect_timeout 10s;

            # 버퍼 비활성화 (SSE/Long Polling 실시간 응답용)
            proxy_buffering     off;
        }
    }
}
