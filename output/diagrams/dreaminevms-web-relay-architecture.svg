    <rect x="0" y="205" width="205" height="170" rx="12" fill="rgba(35,10,20,0.68)" stroke="#ff3030" stroke-width="3"/>
    <g transform="translate(55 232)" filter="url(#softGlow)">
      <ellipse cx="48" cy="42" rx="54" ry="18" fill="#ff4747"/>
      <rect x="5" y="34" width="86" height="44" rx="20" fill="#e22d2d"/>
      <circle cx="48" cy="59" r="27" fill="#6d0610" stroke="#ff7777" stroke-width="4"/>
      <circle cx="48" cy="59" r="12" fill="#ff2f2f"/>
