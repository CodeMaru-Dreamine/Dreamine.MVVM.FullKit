    <text x="54" y="143" text-anchor="middle" class="small">업로드</text>
  </g>

  <!-- Web Server -->
  <g class="ko" transform="translate(915 164)">
    <rect class="panel" x="0" y="0" width="282" height="530" rx="16" stroke="#ffdf00"/>
    <g transform="translate(78 46)" filter="url(#softGlow)" stroke="#ffdf00" stroke-width="5" fill="none">
      <rect x="0" y="0" width="128" height="128" rx="8"/>
      <path d="M0 42 H128 M0 84 H128 M34 128 V150 M12 150 H58"/>
      <circle cx="28" cy="22" r="4" fill="#ffdf00"/>
      <circle cx="88" cy="22" r="4" fill="#ffdf00"/>
      <circle cx="104" cy="22" r="4" fill="#ffdf00"/>
      <circle cx="28" cy="64" r="4" fill="#ffdf00"/>
      <circle cx="88" cy="64" r="4" fill="#ffdf00"/>
