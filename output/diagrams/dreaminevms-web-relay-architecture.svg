  </g>

  <path d="M257 209 H322 Q338 209 338 225 V360" fill="none" stroke="#ff3030" stroke-width="5"/>
  <path d="M257 414 H322 Q338 414 338 398 V360" fill="none" stroke="#ff3030" stroke-width="5"/>
  <path d="M257 619 H322 Q338 619 338 603 V360" fill="none" stroke="#ff3030" stroke-width="5"/>
  <path d="M338 360 H452" fill="none" stroke="#ff3030" stroke-width="5" marker-end="url(#arrowRed)"/>

