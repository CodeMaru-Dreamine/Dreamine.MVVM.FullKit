    <g transform="translate(50 336)" fill="none" stroke="#ffdf00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="34" height="34" rx="4"/><path d="M13 9 L25 17 L13 25 Z" fill="#ffdf00"/>
      <circle cx="18" cy="86" r="24"/><path d="M-6 86 H42 M18 62 C6 75 6 97 18 110 M18 62 C30 75 30 97 18 110"/>
      <circle cx="18" cy="154" r="20"/><path d="M18 130 V120 M18 188 V178 M42 154 H52 M-16 154 H-6 M35 137 L43 129 M1 171 L-7 179 M35 171 L43 179 M1 137 L-7 129"/>
    </g>
    <text x="118" y="363" class="small">실시간 중계</text>
    <text x="118" y="431" class="small">웹 접속 제공</text>
    <text x="118" y="499" class="small">통합 관리</text>
  </g>

  <line x1="1269" y1="158" x2="1269" y2="704" class="dash"/>
  <path d="M1215 360 H1332" fill="none" stroke="#2f86ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <g class="ko" transform="translate(1210 405)">
    <path d="M45 0 C68 18 68 18 91 0 M25 26 C57 52 57 52 111 26 M5 52 C57 96 57 96 131 52" fill="none" stroke="#dfe8fb" stroke-width="5" stroke-linecap="round"/>
    <circle cx="68" cy="90" r="7" fill="#dfe8fb"/>
    <text x="68" y="136" text-anchor="middle" class="small">인터넷 접속</text>
    <text x="68" y="166" text-anchor="middle" class="small">실시간 시청</text>
  </g>

