    <text x="150" y="499" class="small">서버로 업로드</text>
  </g>

  <path d="M802 360 H910" fill="none" stroke="#ffdf00" stroke-width="5" marker-end="url(#arrowYellow)"/>
  <g class="ko" transform="translate(820 408)">
