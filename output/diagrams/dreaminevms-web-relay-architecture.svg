    <text x="102" y="353" text-anchor="middle" class="caption">IP 카메라 2</text>

    <rect x="0" y="410" width="205" height="170" rx="12" fill="rgba(35,10,20,0.68)" stroke="#ff3030" stroke-width="3"/>
    <g transform="translate(62 438)" filter="url(#softGlow)">
