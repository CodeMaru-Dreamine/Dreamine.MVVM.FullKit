  <g class="ko" transform="translate(1405 140)" stroke="#2f86ff" stroke-width="3">
    <rect x="0" y="0" width="215" height="170" rx="12" fill="rgba(10,22,46,0.72)"/>
    <g transform="translate(55 28)" fill="none" stroke="#4b8cff" stroke-width="4">
      <rect x="0" y="0" width="108" height="88" rx="6"/>
      <path d="M0 20 H108"/>
      <circle cx="54" cy="54" r="27"/>
      <path d="M27 54 H81 M54 27 C41 41 41 67 54 81 M54 27 C67 41 67 67 54 81"/>
    </g>
    <text x="108" y="147" text-anchor="middle" class="caption">웹 브라우저</text>

    <rect x="0" y="205" width="215" height="170" rx="12" fill="rgba(10,22,46,0.72)"/>
    <g transform="translate(54 238)" fill="none" stroke="#4b8cff" stroke-width="6">
      <rect x="0" y="0" width="110" height="78" rx="6"/>
      <path d="M55 78 V105 M24 105 H86"/>
    </g>
    <text x="108" y="352" text-anchor="middle" class="caption">PC 클라이언트</text>

    <rect x="0" y="410" width="215" height="170" rx="12" fill="rgba(10,22,46,0.72)"/>
    <g transform="translate(77 435)" fill="none" stroke="#4b8cff" stroke-width="6">
      <rect x="0" y="0" width="62" height="112" rx="8"/>
      <circle cx="31" cy="96" r="3" fill="#4b8cff"/>
    </g>
    <text x="108" y="558" text-anchor="middle" class="caption">모바일 기기</text>
  </g>
  <path d="M1345 214 H1400" fill="none" stroke="#2f86ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M1345 360 H1400" fill="none" stroke="#2f86ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M1345 566 H1400" fill="none" stroke="#2f86ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M1345 214 Q1315 214 1315 360 Q1315 566 1345 566" fill="none" stroke="#2f86ff" stroke-width="5"/>

  <!-- Bottom note -->
  <g class="ko" transform="translate(154 746)">
    <rect x="0" y="0" width="1374" height="160" rx="12" fill="rgba(8,18,35,0.78)" stroke="#435777" stroke-width="2"/>
    <g transform="translate(52 36)" fill="none" stroke="#2f86ff" stroke-width="3">
      <path d="M28 54 C20 36 33 20 50 22 C60 4 90 6 98 28 C118 30 128 45 124 62 H28 Z"/>
      <text x="73" y="65" text-anchor="middle" class="ko" font-size="24" font-weight="800" fill="#ffffff" stroke="none">LAN</text>
      <path d="M73 80 V110 M36 110 H110 M36 110 V130 M73 110 V130 M110 110 V130"/>
      <rect x="24" y="130" width="22" height="18"/><rect x="62" y="130" width="22" height="18"/><rect x="100" y="130" width="22" height="18"/>
    </g>
    <text x="216" y="50" class="subtitle blue">카메라 RTSP 포트를 외부에 개방하지 않고 웹으로 중계합니다.</text>
    <text x="216" y="91" class="small">
      <tspan class="red">IP 카메라</tspan>
      <tspan class="muted"> → </tspan>
      <tspan class="yellow">DreamineVMS Agent/WPF (현장 PC)</tspan>
      <tspan class="muted"> [내부 IP 연결] → </tspan>
      <tspan class="yellow">DreamineVMS.Web 서버</tspan>
      <tspan class="muted"> [웹용 HLS 업로드] → </tspan>
      <tspan class="blue">각 클라이언트</tspan>
      <tspan class="muted"> [실시간 시청]</tspan>
    </text>
    <text x="216" y="132" class="tiny">
      IP 카메라는 현장 PC와 같은 내부망(LAN)에만 연결됩니다. 현장 PC가 영상을 웹용 HLS로 변환해 서버로 업로드하고, 사용자는 브라우저/모바일로 서버에 접속합니다.
    </text>
