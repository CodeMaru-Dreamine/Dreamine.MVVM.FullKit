      <circle cx="88" cy="51" r="24" fill="#680812" stroke="#ff7676" stroke-width="4"/>
      <circle cx="88" cy="51" r="10" fill="#ff3030"/>
      <path d="M28 82 L10 104 L58 104" fill="none" stroke="#ff4545" stroke-width="8" stroke-linecap="round"/>
    </g>
