    <g transform="translate(58 338)" fill="none" stroke="#ffdf00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 20 L18 2 M12 32 L32 12"/>
      <path d="M78 0 H106 V28 H78 Z M112 8 L132 0 V28 L112 20 Z" transform="translate(0 58)"/>
      <path d="M16 0 V36 M4 12 L16 0 L28 12 M0 42 H36" transform="translate(0 126)"/>
