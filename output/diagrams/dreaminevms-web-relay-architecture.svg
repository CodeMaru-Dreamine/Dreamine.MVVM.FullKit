<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="945" viewBox="0 0 1680 945">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#112449"/>
      <stop offset="48%" stop-color="#07162f"/>
      <stop offset="100%" stop-color="#020917"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .ko { font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 800; fill: #ffffff; stroke: none; letter-spacing: 0; }
      .subtitle { font-size: 24px; font-weight: 800; fill: #e8f0ff; stroke: none; }
      .small { font-size: 18px; font-weight: 700; fill: #dbe8ff; stroke: none; }
      .tiny { font-size: 15px; font-weight: 600; fill: #aab9d8; stroke: none; }
      .caption { font-size: 22px; font-weight: 800; fill: #ffffff; stroke: none; }
      .muted { fill: #b9c7df; }
      .blue { fill: #4b8cff; }
      .yellow { fill: #ffd91a; }
      .red { fill: #ff3a3a; }
      .panel { fill: rgba(4, 14, 31, 0.72); stroke-width: 3; filter: url(#shadow); }
      .inner { fill: rgba(14, 30, 54, 0.72); stroke: rgba(162, 184, 225, 0.45); stroke-width: 1.5; }
      .dash { stroke: #71839c; stroke-dasharray: 10 12; stroke-width: 2; opacity: 0.55; }
    </style>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#ff3030"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#ffd91a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2f86ff"/>
    </marker>
  </defs>

  <rect width="1680" height="945" fill="url(#bgGlow)"/>
  <rect x="1" y="1" width="1678" height="943" fill="none" stroke="#0d2b58" stroke-width="2"/>

  <g class="ko" transform="translate(440 30)">
    <rect x="0" y="0" width="805" height="82" rx="14" fill="rgba(10,20,39,0.78)" stroke="#6c7890" stroke-width="2"/>
    <path d="M52 16 L74 27 L74 50 C74 62 64 70 52 76 C40 70 30 62 30 50 L30 27 Z" fill="none" stroke="#4b8cff" stroke-width="4"/>
    <path d="M42 45 L50 53 L64 35" fill="none" stroke="#4b8cff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
