name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Windows build and tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore test projects
        run: |
          dotnet restore "20_SOURCES/200. Tests/Dreamine.FullKit.Tests/Dreamine.FullKit.Tests.csproj"
          dotnet restore "20_SOURCES/200. Tests/Dreamine.FullKit.Wpf.Tests/Dreamine.FullKit.Wpf.Tests.csproj"
          dotnet restore "20_SOURCES/100. Library/UI.WinForms.Tests/Dreamine.UI.WinForms.Tests.csproj"
          dotnet restore "20_SOURCES/998. DEMO/000. Sample/010. Wpfs/SampleCore/SampleCore.csproj"
          dotnet restore "20_SOURCES/998. DEMO/000. Sample/050. CrossUi/SampleCrossUi.Wpf/SampleCrossUi.Wpf.csproj"
          dotnet restore "20_SOURCES/000. Project/010. App/Dreamine.Web/Dreamine.Web.csproj"

      - name: Run tests
        run: |
          dotnet test "20_SOURCES/200. Tests/Dreamine.FullKit.Tests/Dreamine.FullKit.Tests.csproj" --no-restore --configuration Release -m:1 --verbosity minimal
          dotnet test "20_SOURCES/200. Tests/Dreamine.FullKit.Wpf.Tests/Dreamine.FullKit.Wpf.Tests.csproj" --no-restore --configuration Release -m:1 --verbosity minimal
          dotnet test "20_SOURCES/100. Library/UI.WinForms.Tests/Dreamine.UI.WinForms.Tests.csproj" --no-restore --configuration Release -m:1 --verbosity minimal

      - name: Build representative samples
        run: |
          dotnet build "20_SOURCES/998. DEMO/000. Sample/010. Wpfs/SampleCore/SampleCore.csproj" --no-restore --configuration Release -m:1 --verbosity minimal
          dotnet build "20_SOURCES/998. DEMO/000. Sample/050. CrossUi/SampleCrossUi.Wpf/SampleCrossUi.Wpf.csproj" --no-restore --configuration Release -m:1 --verbosity minimal
          dotnet build "20_SOURCES/000. Project/010. App/Dreamine.Web/Dreamine.Web.csproj" --no-restore --configuration Release -m:1 --verbosity minimal
